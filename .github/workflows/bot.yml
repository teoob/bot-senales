# ============================================================
# GitHub Actions - corre el bot cada 5 minutos, gratis.
# UBICACION OBLIGATORIA dentro del repo:
#   .github/workflows/bot.yml
# Secrets requeridos (Settings > Secrets and variables > Actions):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
# ============================================================
name: bot-senales

permissions:
  contents: write   # necesario para que el bot pueda guardar su estado (git push)

on:
  schedule:
    - cron: "*/5 * * * *"    # cada 5 min (puede demorar unos min extra)
  workflow_dispatch:          # permite ejecutarlo a mano para probar

jobs:
  escanear:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Escanear pares
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_senales.py --once

      # guarda el registro de señales Y el estado (offset de comandos,
      # dedupe de señales ya enviadas) para que persistan entre corridas
      - name: Guardar registro y estado
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          [ -f registro_senales.csv ] && git add registro_senales.csv
          [ -f estado.json ] && git add estado.json
          if git diff --cached --quiet; then
            echo "Nada nuevo para guardar."
          else
            git commit -m "registro y estado"
            git pull --rebase origin main || true
            if git push; then
              echo "Estado guardado correctamente."
            else
              echo "::error::No se pudo guardar el estado (revisar permisos del workflow: Settings > Actions > General > Workflow permissions > Read and write)."
            fi
          fi
