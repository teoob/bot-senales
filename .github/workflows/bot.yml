# ============================================================
# GitHub Actions - corre el bot cada 15 minutos, gratis.
# UBICACION OBLIGATORIA dentro del repo:
#   .github/workflows/bot.yml
# Secrets requeridos (Settings > Secrets and variables > Actions):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
# ============================================================
name: bot-senales

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 min (puede demorar unos min extra)
  workflow_dispatch:          # permite ejecutarlo a mano para probar

jobs:
  escanear:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Escanear pares
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_senales.py --once

      # guarda el registro de señales dentro del repo (historial para el post-mortem)
      - name: Guardar registro
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add registro_senales.csv || true
          git diff --cached --quiet || git commit -m "registro de señales"
          git push || true
